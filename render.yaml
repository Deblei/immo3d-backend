services:
  - type: web
    name: immo3d-ci-backend
    runtime: node
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
    disk:
      name: immo3d-data
      mountPath: /data
      sizeGB: 1
